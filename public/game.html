<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game - Sprint 3</title>
    <style>
      :root {
        --bg: #9fd0ff;
        --panel: rgba(8, 24, 51, 0.86);
        --accent: #2fd3c8;
        --text: #eef7ff;
      }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at top, #d7ecff, var(--bg));
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #gameCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px;
        background: var(--panel);
        border: 1px solid #2a588f;
        border-radius: 8px;
        max-width: 420px;
        font-size: 0.92rem;
        z-index: 10;
      }
      #controls {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid #2aa79f;
        background: #114e77;
        color: var(--text);
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
      #status {
        margin-top: 6px;
        color: var(--accent);
      }
      #touchControls {
        position: fixed;
        left: 50%;
        bottom: 102px;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(3, minmax(64px, 88px));
        grid-template-rows: repeat(2, 52px);
        gap: 8px;
        z-index: 12;
      }
      #inventoryBar {
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        z-index: 15;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgba(6, 15, 28, 0.62);
        border: 1px solid rgba(64, 106, 148, 0.8);
      }
      .inventory-slot {
        position: relative;
        width: 56px;
        height: 56px;
        border: 1px solid rgba(61, 85, 110, 0.9);
        border-radius: 8px;
        background-color: rgba(24, 37, 55, 0.92);
        background-image: url("/sprites-the-real-deal/invintory.png");
        background-size: cover;
        background-position: center;
        color: #eaf4ff;
        font-size: 0.72rem;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 2px;
      }
      .inventory-slot.active {
        outline: 2px solid #2fd3c8;
        box-shadow: 0 0 10px rgba(47, 211, 200, 0.55);
      }
      .inventory-key {
        position: absolute;
        top: 2px;
        left: 4px;
        font-size: 0.65rem;
        color: #c9dbf5;
      }
      .inventory-label {
        font-size: 0.56rem;
        text-align: center;
        width: 100%;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
      }
      .inventory-icon {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 28px;
        height: 28px;
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        pointer-events: none;
      }
      .touchBtn {
        border: 1px solid #2aa79f;
        background: rgba(17, 78, 119, 0.85);
        color: var(--text);
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        touch-action: none;
        user-select: none;
      }
      .touchBtn:active,
      .touchBtn.active {
        background: rgba(47, 211, 200, 0.9);
        color: #03121e;
      }
      #touchTurnLeft {
        grid-column: 1;
        grid-row: 2;
      }
      #touchForward {
        grid-column: 2;
        grid-row: 1;
      }
      #touchBackward {
        grid-column: 2;
        grid-row: 2;
      }
      #touchTurnRight {
        grid-column: 3;
        grid-row: 2;
      }
      @media (max-width: 860px) {
        #hud {
          max-width: calc(100% - 24px);
          font-size: 0.85rem;
        }
      }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
  </head>
  <body>
    <div id="hud">
      <div><strong>Sprint 3 First-Person Preview</strong></div>
      <div>Move: W/S | Turn: A/D | Look: Mouse drag | Attack: tap or left-click target</div>
      <div id="playerStats">Loading player...</div>
      <div id="groupStats">Group: none</div>
      <div id="status">Starting world...</div>
      <div id="controls">
        <button id="refreshBtn">Refresh World</button>
        <button id="createGroupBtn">Create Group</button>
        <button id="exchangeBtn">Exchange Tool (Q)</button>
        <button id="backBtn">Back</button>
      </div>
    </div>
    <div id="touchControls" aria-label="Touch movement controls">
      <button id="touchForward" class="touchBtn">Forward</button>
      <button id="touchBackward" class="touchBtn">Back</button>
      <button id="touchTurnLeft" class="touchBtn">Turn Left</button>
      <button id="touchTurnRight" class="touchBtn">Turn Right</button>
    </div>
    <div id="inventoryBar" aria-label="Inventory hotbar">
      <button class="inventory-slot" data-slot="0"><span class="inventory-key">0</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="1"><span class="inventory-key">1</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="2"><span class="inventory-key">2</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="3"><span class="inventory-key">3</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="4"><span class="inventory-key">4</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="5"><span class="inventory-key">5</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="6"><span class="inventory-key">6</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="7"><span class="inventory-key">7</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="8"><span class="inventory-key">8</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
      <button class="inventory-slot" data-slot="9"><span class="inventory-key">9</span><span class="inventory-icon"></span><span class="inventory-label"></span></button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "/";
      }

      const statusEl = document.getElementById("status");
      const playerStatsEl = document.getElementById("playerStats");
      const groupStatsEl = document.getElementById("groupStats");
      const inventorySlotEls = Array.from(document.querySelectorAll(".inventory-slot"));

      const canvas = document.getElementById("gameCanvas");
      const engine = new BABYLON.Engine(canvas, true);
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.72, 0.88, 1, 1);

      const TOOL_STATS = {
        sword: { name: "Sword", damage: 5, cooldownMs: 1000 },
        mace: { name: "Mace", damage: 7, cooldownMs: 700 },
        pickaxe: { name: "Pickaxe", damage: 6, cooldownMs: 500 },
        "diamond-mace": { name: "Diamond Mace", damage: 9, cooldownMs: 600 },
        "diamond-pickaxe": { name: "Diamond Pickaxe", damage: 8, cooldownMs: 400 },
        "diamond-sword": { name: "Diamond Sword", damage: 10, cooldownMs: 700 }
      };

      const TOOL_SPRITES = {
        sword: "/sprites-the-real-deal/sword2.png"
      };

      const camera = new BABYLON.UniversalCamera("playerCam", new BABYLON.Vector3(0, 4.5, 0), scene);
      camera.speed = 0;
      camera.angularSensibility = 3000;
      camera.minZ = 0.1;
      camera.keysUp = [];
      camera.keysDown = [];
      camera.keysLeft = [];
      camera.keysRight = [];
      camera.attachControl(canvas, true);

      const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
      hemi.intensity = 0.85;

      const dir = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.5, -1, 0.5), scene);
      dir.position = new BABYLON.Vector3(30, 50, -30);

      const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 2400, height: 2400 }, scene);
      const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
      groundMat.diffuseColor = new BABYLON.Color3(0.14, 0.22, 0.17);
      ground.material = groundMat;

      const sky = BABYLON.MeshBuilder.CreateSphere("sky", { diameter: 6000, segments: 16 }, scene);
      const skyMat = new BABYLON.StandardMaterial("skyMat", scene);
      skyMat.backFaceCulling = false;
      skyMat.disableLighting = true;
      skyMat.diffuseColor = new BABYLON.Color3(0.72, 0.88, 1);
      sky.material = skyMat;

      const enemyMeshes = new Map();
      const bossMeshes = new Map();
      const chestMeshes = new Map();

      const hiddenButtons = [
        { bossId: "boss-hydra", label: "Hydra Button", x: 420, y: 300 },
        { bossId: "boss-cyclops", label: "Cyclops Button", x: -500, y: -260 }
      ];
      const hiddenButtonMeshes = new Map();

      let worldState = null;
      let inventoryState = null;
      let movePushCooldown = 0;
      let movedSinceLastPush = false;
      let buttonRespawnCooldownUntil = 0;

      const inputState = {
        forward: false,
        backward: false,
        turnLeft: false,
        turnRight: false
      };

      const MOVE_SPEED = 22;
      const TURN_SPEED = 2.2;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function shortToolLabel(toolName) {
        if (!toolName) {
          return "";
        }
        return toolName
          .replace("Diamond ", "D-")
          .replace("Pickaxe", "Pick")
          .replace("Sword", "Swd")
          .replace("Mace", "Mac");
      }

      function renderInventory(inventory) {
        inventoryState = inventory;

        inventorySlotEls.forEach((slotEl) => {
          const slotIndex = Number(slotEl.dataset.slot);
          const tool = inventory?.slots?.[slotIndex] ?? null;
          const labelEl = slotEl.querySelector(".inventory-label");
          const iconEl = slotEl.querySelector(".inventory-icon");

          if (labelEl) {
            labelEl.textContent = tool ? shortToolLabel(tool.name) : "";
          }
          if (iconEl) {
            const spritePath = tool?.id ? TOOL_SPRITES[tool.id] : "";
            iconEl.style.backgroundImage = spritePath ? `url(${spritePath})` : "none";
          }

          slotEl.classList.toggle("active", slotIndex === inventory?.selectedSlot);
        });
      }

      function setupHiddenButtonMeshes() {
        for (const hiddenButton of hiddenButtons) {
          const plate = BABYLON.MeshBuilder.CreateDisc(
            `hidden-button-${hiddenButton.bossId}`,
            { radius: 5, tessellation: 32 },
            scene
          );
          plate.rotation.x = Math.PI / 2;
          plate.position.x = hiddenButton.x;
          plate.position.y = 0.2;
          plate.position.z = hiddenButton.y;

          const mat = new BABYLON.StandardMaterial(`hidden-button-mat-${hiddenButton.bossId}`, scene);
          mat.diffuseColor = new BABYLON.Color3(0.15, 0.22, 0.28);
          mat.emissiveColor = new BABYLON.Color3(0.06, 0.09, 0.1);
          plate.material = mat;

          hiddenButtonMeshes.set(hiddenButton.bossId, { mesh: plate, mat });
        }
      }

      function upsertEnemyMesh(enemy) {
        let mesh = enemyMeshes.get(enemy.id);
        if (!mesh) {
          mesh = BABYLON.MeshBuilder.CreateBox(enemy.id, { size: 8 }, scene);
          const mat = new BABYLON.StandardMaterial(`mat-${enemy.id}`, scene);
          mat.diffuseColor = new BABYLON.Color3(0.9, 0.2, 0.2);
          mesh.material = mat;
          enemyMeshes.set(enemy.id, mesh);
        }
        mesh.position.x = enemy.x;
        mesh.position.y = 4;
        mesh.position.z = enemy.y;
      }

      function upsertBossMesh(boss) {
        let mesh = bossMeshes.get(boss.id);
        if (!mesh) {
          const isHydra = boss.id.includes("hydra");
          mesh = BABYLON.MeshBuilder.CreateCylinder(
            boss.id,
            { diameterTop: isHydra ? 18 : 14, diameterBottom: isHydra ? 22 : 16, height: 16 },
            scene
          );
          const mat = new BABYLON.StandardMaterial(`boss-mat-${boss.id}`, scene);
          mat.diffuseColor = isHydra
            ? new BABYLON.Color3(0.1, 0.8, 0.45)
            : new BABYLON.Color3(0.75, 0.7, 0.2);
          mesh.material = mat;
          bossMeshes.set(boss.id, mesh);
        }
        mesh.position.x = boss.x;
        mesh.position.y = 8;
        mesh.position.z = boss.y;
      }

      function upsertChestMesh(chest) {
        let mesh = chestMeshes.get(chest.id);
        if (!mesh) {
          mesh = BABYLON.MeshBuilder.CreateBox(
            chest.id,
            { width: 8, height: 5, depth: 6 },
            scene
          );
          const mat = new BABYLON.StandardMaterial(`chest-mat-${chest.id}`, scene);
          mat.diffuseColor = new BABYLON.Color3(0.82, 0.67, 0.43);
          mat.specularColor = new BABYLON.Color3(0.2, 0.17, 0.1);
          mesh.material = mat;
          chestMeshes.set(chest.id, mesh);
        }
        mesh.position.x = chest.x;
        mesh.position.y = 2.5;
        mesh.position.z = chest.y;
      }

      function cleanupMissingMeshes(liveEnemies, liveBosses, liveChests) {
        const liveEnemyIds = new Set(liveEnemies.map((e) => e.id));
        for (const [id, mesh] of enemyMeshes) {
          if (!liveEnemyIds.has(id)) {
            mesh.dispose();
            enemyMeshes.delete(id);
          }
        }

        const liveBossIds = new Set(liveBosses.map((b) => b.id));
        for (const [id, mesh] of bossMeshes) {
          if (!liveBossIds.has(id)) {
            mesh.dispose();
            bossMeshes.delete(id);
          }
        }

        const liveChestIds = new Set(liveChests.map((c) => c.id));
        for (const [id, mesh] of chestMeshes) {
          if (!liveChestIds.has(id)) {
            mesh.dispose();
            chestMeshes.delete(id);
          }
        }
      }

      function renderWorldState(data) {
        worldState = data;
        const player = data.player;
        camera.position.x = player.x;
        camera.position.z = player.y;
        const tool = TOOL_STATS[player.equippedTool] ?? TOOL_STATS.sword;
        const toolText = player.equippedTool
          ? `${tool.name} (DMG ${tool.damage}, CD ${(tool.cooldownMs / 1000).toFixed(1)}s)`
          : "None";
        playerStatsEl.textContent = `Player ${player.username} | HP ${player.health} | XP ${player.xp} | Gold ${player.gold} | Tool ${toolText}`;

        const group = data.group;
        groupStatsEl.textContent = group
          ? `Group ${group.id} (${group.members.join(", ")})`
          : "Group: none";

        for (const enemy of data.enemies) {
          upsertEnemyMesh(enemy);
        }
        for (const boss of data.bosses || []) {
          upsertBossMesh(boss);
        }
        for (const chest of data.chests || []) {
          upsertChestMesh(chest);
        }
        cleanupMissingMeshes(data.enemies, data.bosses || [], data.chests || []);
        renderInventory(data.inventory);

        setStatus(`Sections active: ${data.activeSections.length} | Enemies: ${data.enemies.length} | Bosses: ${(data.bosses || []).length} | Chests: ${(data.chests || []).length}`);
      }

      async function api(path, method = "GET", body = null) {
        const response = await fetch(path, {
          method,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: body ? JSON.stringify(body) : undefined
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || `Request failed: ${path}`);
        }
        return data;
      }

      async function refreshWorld() {
        try {
          const data = await api("/api/world/state");
          renderWorldState(data);
        } catch (error) {
          setStatus(`Refresh failed: ${error.message}`);
        }
      }

      async function pushMovement() {
        if (movePushCooldown > Date.now()) {
          return;
        }
        movePushCooldown = Date.now() + 250;

        try {
          const data = await api("/api/world/move", "POST", {
            x: camera.position.x,
            y: camera.position.z
          });
          renderWorldState(data);
        } catch (error) {
          setStatus(`Move rejected: ${error.message}`);
        }
      }

      async function checkHiddenButtonRespawn() {
        if (!worldState || Date.now() < buttonRespawnCooldownUntil) {
          return;
        }

        const deadBossIds = new Set(["boss-hydra", "boss-cyclops"]);
        for (const liveBoss of worldState.bosses || []) {
          deadBossIds.delete(liveBoss.id);
        }

        if (deadBossIds.size === 0) {
          return;
        }

        for (const hiddenButton of hiddenButtons) {
          if (!deadBossIds.has(hiddenButton.bossId)) {
            continue;
          }

          const distanceToButton = Math.hypot(
            camera.position.x - hiddenButton.x,
            camera.position.z - hiddenButton.y
          );

          const meshEntry = hiddenButtonMeshes.get(hiddenButton.bossId);
          if (meshEntry) {
            const isOnButton = distanceToButton <= 8;
            meshEntry.mat.emissiveColor = isOnButton
              ? new BABYLON.Color3(0.2, 0.5, 0.45)
              : new BABYLON.Color3(0.06, 0.09, 0.1);
          }

          if (distanceToButton <= 8) {
            buttonRespawnCooldownUntil = Date.now() + 1500;
            try {
              const data = await api("/api/bosses/hidden-respawn", "POST", { bossId: hiddenButton.bossId });
              setStatus(`${hiddenButton.label} pressed: ${data.message}`);
              await refreshWorld();
            } catch (error) {
              if (!String(error.message).includes("already alive")) {
                setStatus(`Hidden button failed: ${error.message}`);
              }
            }
            return;
          }
        }
      }

      function setControlState(controlName, isPressed) {
        inputState[controlName] = isPressed;
      }

      function registerHoldButton(buttonId, controlName) {
        const btn = document.getElementById(buttonId);
        const press = (event) => {
          event.preventDefault();
          setControlState(controlName, true);
          btn.classList.add("active");
        };
        const release = (event) => {
          event.preventDefault();
          setControlState(controlName, false);
          btn.classList.remove("active");
        };

        btn.addEventListener("pointerdown", press);
        btn.addEventListener("pointerup", release);
        btn.addEventListener("pointercancel", release);
        btn.addEventListener("pointerleave", release);
      }

      function updateMovement() {
        const deltaTime = engine.getDeltaTime() / 1000;
        let didMove = false;

        if (inputState.turnLeft) {
          camera.rotation.y -= TURN_SPEED * deltaTime;
          didMove = true;
        }
        if (inputState.turnRight) {
          camera.rotation.y += TURN_SPEED * deltaTime;
          didMove = true;
        }

        const moveDirection =
          (inputState.forward ? 1 : 0) +
          (inputState.backward ? -1 : 0);
        if (moveDirection !== 0) {
          const yaw = camera.rotation.y;
          const forwardVector = new BABYLON.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
          const moveAmount = moveDirection * MOVE_SPEED * deltaTime;
          camera.position.x += forwardVector.x * moveAmount;
          camera.position.z += forwardVector.z * moveAmount;
          didMove = true;
        }

        if (didMove) {
          movedSinceLastPush = true;
        }
      }

      async function attackTarget(targetId) {
        if (!targetId) {
          return;
        }

        try {
          if (enemyMeshes.has(targetId)) {
            const data = await api("/api/combat/attack", "POST", { enemyId: targetId });
            renderWorldState(data);
            setStatus(`Enemy hit: ${targetId}`);
            return;
          }

          if (bossMeshes.has(targetId)) {
            const data = await api("/api/combat/attack-boss", "POST", { bossId: targetId });
            renderWorldState(data);
            setStatus(`Boss hit: ${targetId}`);
            return;
          }

          if (chestMeshes.has(targetId)) {
            const data = await api("/api/chests/open", "POST", { chestId: targetId });
            renderWorldState(data);
            setStatus(data.message);
          }
        } catch (error) {
          setStatus(`Attack failed: ${error.message}`);
        }
      }

      async function selectInventorySlot(slot) {
        try {
          const data = await api("/api/inventory/select", "POST", { slot });
          renderWorldState(data);
          setStatus(`Selected slot ${slot}`);
        } catch (error) {
          setStatus(`Select failed: ${error.message}`);
        }
      }

      async function exchangeSelectedTool() {
        try {
          const data = await api("/api/inventory/exchange", "POST", {});
          renderWorldState(data);
          setStatus(data.message);
        } catch (error) {
          setStatus(`Exchange failed: ${error.message}`);
        }
      }

      scene.onKeyboardObservable.add((kbInfo) => {
        const key = kbInfo.event.key.toLowerCase();
        const isDown = kbInfo.type === BABYLON.KeyboardEventTypes.KEYDOWN;

        if (!isDown) {
          return;
        }

        if (/^[0-9]$/.test(key)) {
          selectInventorySlot(Number(key));
          return;
        }
        if (key === "q") {
          exchangeSelectedTool();
          return;
        }

        if (key === "w") {
          setControlState("forward", true);
        } else if (key === "s") {
          setControlState("backward", true);
        } else if (key === "a") {
          setControlState("turnLeft", true);
        } else if (key === "d") {
          setControlState("turnRight", true);
        }
      });

      window.addEventListener("keyup", (event) => {
        const key = event.key.toLowerCase();
        if (key === "w") {
          setControlState("forward", false);
        } else if (key === "s") {
          setControlState("backward", false);
        } else if (key === "a") {
          setControlState("turnLeft", false);
        } else if (key === "d") {
          setControlState("turnRight", false);
        }
      });

      scene.onPointerObservable.add((pointerInfo) => {
        if (pointerInfo.type !== BABYLON.PointerEventTypes.POINTERDOWN) {
          return;
        }

        const event = pointerInfo.event;
        const isTouch = event.pointerType === "touch";
        const isLeftClick = event.button === 0;
        if (!isTouch && !isLeftClick) {
          return;
        }

        const pick = scene.pick(scene.pointerX, scene.pointerY);
        const pickedId = pick?.pickedMesh?.id;
        if (!pickedId) {
          return;
        }

        attackTarget(pickedId);
      });

      scene.onBeforeRenderObservable.add(() => {
        updateMovement();
      });

      scene.onAfterRenderObservable.add(() => {
        if (movedSinceLastPush) {
          movedSinceLastPush = false;
          pushMovement();
        }
        checkHiddenButtonRespawn();
      });

      registerHoldButton("touchForward", "forward");
      registerHoldButton("touchBackward", "backward");
      registerHoldButton("touchTurnLeft", "turnLeft");
      registerHoldButton("touchTurnRight", "turnRight");

      inventorySlotEls.forEach((slotEl) => {
        slotEl.addEventListener("click", () => {
          const slot = Number(slotEl.dataset.slot);
          selectInventorySlot(slot);
        });
      });

      document.getElementById("refreshBtn").addEventListener("click", refreshWorld);
      document.getElementById("createGroupBtn").addEventListener("click", async () => {
        try {
          const data = await api("/api/group/create", "POST", {});
          groupStatsEl.textContent = `Group ${data.group.id} (${data.group.members.join(", ")})`;
          setStatus("Group created.");
        } catch (error) {
          setStatus(`Group create failed: ${error.message}`);
        }
      });
      document.getElementById("backBtn").addEventListener("click", () => {
        window.location.href = "/main.html";
      });
      document.getElementById("exchangeBtn").addEventListener("click", exchangeSelectedTool);

      window.addEventListener("resize", () => {
        engine.resize();
      });

      async function boot() {
        try {
          setupHiddenButtonMeshes();
          await api("/api/world/join", "POST", { x: 0, y: 0 });
          await refreshWorld();

          // Keep world state fresh so boss movement is visible even if player is standing still.
          setInterval(() => {
            refreshWorld();
          }, 1200);

          engine.runRenderLoop(() => {
            scene.render();
          });
        } catch (error) {
          setStatus(`Startup failed: ${error.message}`);
        }
      }

      boot();
    </script>
  </body>
</html>
