<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Page - Sprint 4</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        background: #0a1f44;
        color: #f0f6ff;
      }
      button {
        padding: 0.6rem 1rem;
        margin-right: 0.5rem;
        background: #1f4fa3;
        border: 1px solid #4b74bf;
        color: #f0f6ff;
      }
      #status { margin-top: 1rem; }
      .report-box {
        margin-top: 1rem;
        padding: 0.75rem;
        border: 1px solid #2f4f87;
        background: #102751;
      }
      .report-box label {
        display: block;
        margin-top: 0.5rem;
      }
      .report-box input,
      .report-box textarea,
      .report-box select {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        background: #16305f;
        border: 1px solid #2f4f87;
        color: #f0f6ff;
      }
    </style>
  </head>
  <body>
    <h1>Main Page - Sprint 4</h1>
    <p>You are here only after correct passcodes and login.</p>
    <button id="startGameBtn">Start Game</button>
    <button id="newsBtn">News</button>
    <button id="submitReportBtn">Submit Report</button>

    <div class="report-box">
      <strong>Bug/Player Report</strong>
      <label for="reportType">Report Type</label>
      <select id="reportType">
        <option value="bug">Bug</option>
        <option value="player">Player</option>
      </select>
      <label for="reportedUser">Reported Player (optional for bug reports)</label>
      <input id="reportedUser" type="text" placeholder="player username" />
      <label for="reportReason">Reason</label>
      <textarea id="reportReason" rows="3" placeholder="Describe the issue"></textarea>
    </div>

    <div id="status"></div>

    <script>
      const statusEl = document.getElementById("status");
      const token = localStorage.getItem("token");
      const startGameBtn = document.getElementById("startGameBtn");
      const newsBtn = document.getElementById("newsBtn");
      const submitReportBtn = document.getElementById("submitReportBtn");
      const reportTypeEl = document.getElementById("reportType");
      const reportedUserEl = document.getElementById("reportedUser");
      const reportReasonEl = document.getElementById("reportReason");

      if (!token) {
        statusEl.textContent = "Not logged in. Redirecting...";
        setTimeout(() => (window.location.href = "/"), 700);
      } else {
        fetch("/api/main", {
          headers: { Authorization: `Bearer ${token}` }
        })
          .then(async (response) => {
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || "Auth failed");
            }
            statusEl.textContent = data.message;
            if (data.role) {
              localStorage.setItem("role", data.role);
            }
          })
          .catch((error) => {
            statusEl.textContent = `Access denied: ${error.message}`;
            setTimeout(() => (window.location.href = "/"), 1000);
          });

        startGameBtn.addEventListener("click", async () => {
          startGameBtn.disabled = true;
          statusEl.textContent = "Joining world...";

          try {
            const response = await fetch("/api/world/join", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
              },
              body: JSON.stringify({ x: 0, y: 0 })
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || "Failed to join world");
            }

            localStorage.setItem("lastWorldState", JSON.stringify(data));
            window.location.href = "/game.html";
          } catch (error) {
            statusEl.textContent = `Start Game failed: ${error.message}`;
            startGameBtn.disabled = false;
          }
        });

        newsBtn.addEventListener("click", () => {
          window.location.href = "/news.html";
        });

        submitReportBtn.addEventListener("click", async () => {
          const reason = reportReasonEl.value.trim();
          const source = reportTypeEl.value;
          const reportedUser = reportedUserEl.value.trim();

          if (!reason) {
            statusEl.textContent = "Please enter a reason for the report.";
            return;
          }

          submitReportBtn.disabled = true;
          statusEl.textContent = "Submitting report...";

          try {
            const response = await fetch("/api/reports", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
              },
              body: JSON.stringify({
                reason,
                source,
                reportedUser: source === "player" ? reportedUser : undefined
              })
            });

            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || "Report failed");
            }

            statusEl.textContent = "Report submitted. It is now visible in News.";
            reportReasonEl.value = "";
            if (source !== "player") {
              reportedUserEl.value = "";
            }
          } catch (error) {
            statusEl.textContent = `Report failed: ${error.message}`;
          } finally {
            submitReportBtn.disabled = false;
          }
        });
      }
    </script>
  </body>
</html>
